<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventsCatalog</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Css -->
    <Link rel="stylesheet" href="../Css/Views/LogView.css"> 
    <Link rel="stylesheet" href="../Css/Boxes.css">
    <link rel="stylesheet" href="../Css/Buttons.css">
    <link rel="stylesheet" href="../Css/responsive.css">
</head>
<body>
    <div class="d-flex align-items-center justify-content-end login-container">
        <div id="user-Box" class="p-5 text-white glass-box">
            <!-- esto se debe inyectar con js. box de registro parecido -->
            <h2 class="mb-4 fw-bold text-uppercase">Log In</h2>
            <form>
                <div class="mb-3 position-relative">
                    <input type="email" class="form-control custom-input" placeholder="E-mail address">
                </div>
                
                <div class="mb-3 position-relative">
                    <input type="password" class="form-control custom-input" placeholder="Password">
                    <i class="bi bi-lock-fill custom-icon"></i>
                </div>

                <button type="submit" class="btn fw-bold mb-3 button-login">SIGN IN</button>
                
                <div class="text-center small">
                    No tiene una cuenta? <a href="#" class="text-white fw-bold custom-link">Registrar</a>
                </div>
            </form>
        </div>
    </div>
</body>
