<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogos de Evento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/Views/IndexView.css">
    <link rel="stylesheet" href="css/Boxes.css">
    <link rel="stylesheet" href="css/Button.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="timer-container glass-box" style="display: none;">
        <a href="Html/payView.html" class="px-2 py-2">
            <i class="bi bi-cart cart px-2 py-1" style="font-size: 1.5rem;"></i>
        </a>
        <div id="timerContainer"></div>
    </div>

    <div class="main-container p-3">
        <header class="header-section d-flex flex-wrap justify-content-between align-items-center mb-4">
            <div id="title">
                <h1 class="display-4">Catálogo de <em>Eventos</em></h1>
                <p id="pageDetail">EVENTOS · PÁGINA</p>
            </div>
            <div id="userContainer"></div>
        </header>

        <nav id="SortByButtons" class="filter-bar d-flex flex-wrap gap-2 mb-4">
            <span class="align-self-center me-2">ORDENAR POR :</span>
            <button id="Newest" class="btn btn-sm rounded-pill button-filter-selected">↓ Más reciente</button>
            <button id="DateAsc" class="btn btn-sm rounded-pill button-filter-waiting">Fecha ↑</button>
            <button id="DateDesc" class="btn btn-sm rounded-pill button-filter-waiting">Fecha ↓</button>
            <button id="NameAsc" class="btn btn-sm rounded-pill button-filter-waiting">Nombre A-Z</button>
            <button id="NameDesc" class="btn btn-sm rounded-pill button-filter-waiting">Nombre Z-A</button>
        </nav>

        <div class="table-container">
            <table class="table table-striped custom-table">
                <thead>
                    <tr>
                        <th class="button-column"></th>
                        <th class="name-column">NOMBRE</th>
                        <th class="venue-column">DIRECCION</th>
                        <th class="date-column">FECHA</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <footer id="footer" class="pagination-footer d-flex justify-content-center align-items-center gap-3 mt-4">
            <!--Disabled o no segun hay o no mas paginas-->
            <button id="buttonPrev" class="btn btn-light btn-sm button-page" disabled>‹ Anterior</button>
            <span id="pageIndicator" class="page-indicator"></span>
            <button id="buttonNext" class="btn btn-light btn-sm button-page" disabled>Siguiente ›</button>
        </footer>
    </div>

    <div id="userModal" class="user-overlay d-none">
    <div class="user-panel">
        <h3>Cerrar Sesión</h3>
        <div class="user-buttons mt-3">
            <button id="cancel" class="btn btn-secondary">Cancelar</button>
            <button id="confirm" class="btn btn-primary">Aceptar</button>
        </div>
    </div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script type="module" src="js/views/index.js"></script>
<script type="module" src="js/tools/timer.js"></script>
</html>
