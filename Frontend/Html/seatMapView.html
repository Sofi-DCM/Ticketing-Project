<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Asientos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/Views/SeatMapView.css">
    <link rel="stylesheet" href="../css/Button.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/toast.css">
</head>

<body>
    <div class="top-bar">
        <button id="backButton" class="button-back">Volver</button>
        <div id="userContainer"></div>
    </div>

    <div class="event-header">
        <h1 id="eventTitle">Evento</h1>

        <div class="event-info">
            <span id="eventDate"></span>
            <span id="eventVenue"></span>
            <span id="eventPrice"></span>
        </div>
    </div>
    <div id="seatMap" class="seat-map"></div>

    <div id="seatModal" class="seat-modal hidden">
        <div class="seat-modal-content">
            <h2>Confirmar asiento</h2>
            <p id="seatModalText"></p>
            <div class="seat-modal-buttons">
                <button id="confirmSeatBtn" class="modal-confirm">
                    Aceptar
                </button>
                <button id="cancelSeatBtn" class="modal-cancel">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

</body>

<script type="module" src="../js/views/seatMapView.js"></script>
</html>
