<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Asientos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/Views/SeatMapView.css">
    <link rel="stylesheet" href="../Css/Boxes.css">
    <link rel="stylesheet" href="../css/Button.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/toast.css">
</head>

<body>
    <div class="timer-container glass-box" style="display: none;">
        <a href="payView.html" class="px-2 py-2">
            <i class="bi bi-cart cart px-2 py-1" style="font-size: 1.5rem;"></i>
        </a>
        <div id="timerContainer"></div>
    </div>
    
    <div class="top-bar">
        <button id="backButton" class="button-back">Volver</button>
        <div id="userContainer"></div>
    </div>

    <div class="event-header">
        <h1 id="eventTitle">Evento</h1>

        <div class="event-info">
            <span id="eventDate"></span>
            <span id="eventVenue"></span>
            <span id="eventPrice"></span>
        </div>
    </div>

    <div class="seat-legend">
        <div class="legend-item">
            <span class="legend-color available"></span>
            <span>Disponible</span>
        </div>
        <div class="legend-item">
            <span class="legend-color reserved"></span>
            <span>Reservado</span>
        </div>
        <div class="legend-item">
            <span class="legend-color sold"></span>
            <span>Vendido</span>
        </div>
    </div>
    
    <div id="seatMap" class="seat-map"></div>

    <div id="seatModal" class="seat-modal hidden">
        <div class="seat-modal-content">
            <h2>Confirmar asiento</h2>
            <p id="seatModalText"></p>
            <div class="seat-modal-buttons">
                <button id="confirmSeatBtn" class="modal-confirm">
                    Aceptar
                </button>
                <button id="cancelSeatBtn" class="modal-cancel">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <div id="userModal" class="user-overlay d-none">
    <div class="user-panel">
        <h3>Cerrar Sesión</h3>
        <div class="user-buttons mt-3">
            <button id="cancel" class="btn btn-secondary">Cancelar</button>
            <button id="confirm" class="btn btn-primary">Aceptar</button>
        </div>
    </div>
</body>

<script type="module" src="../js/views/seatMapView.js"></script>
<script type="module" src="../js/tools/timer.js"></script>
</html>
