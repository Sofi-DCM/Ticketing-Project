<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin View</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/Views/adminView.css">
    <link rel="stylesheet" href="../Css/Boxes.css">
    <link rel="stylesheet" href="../Css/Button.css">
    <link rel="stylesheet" href="../Css/toast.css">
    <link rel="stylesheet" href="../Css/responsive.css">
</head>
    <div class="timer-container glass-box" style="display: none;">
        <a href="payView.html" class="px-2 py-2">
            <i class="bi bi-cart cart px-2 py-1" style="font-size: 1.5rem;"></i>
        </a>
        <div id="timerContainer"></div>
    </div>
<body class="event-mod"> <!--quitar el class-->
    <nav class="d-flex flex-wrap justify-content-between align-items-center mb-4 ">
        <h1 class="pt-2 title"><strong>Vista de administrador</strong></h1>
        <button id="createEvent" type="click" class="btn fw-bold button-custom button-create-event ">Crear Evento</button>
        <button id="seeAudit" type="click" class="btn fw-bold button-custom button-audit ">Ver Auditoria</button>
        <a id="sesion" href="../index.html" class="btn fw-bold button-custom user-button p-1">Cerrar sesion</a>
    </nav>

    <div id="mainContainer" class="main-container">
        <nav id="filters" class="p-2  text-white">
            <label for="userId">User ID:</label>
            <input type="number" id="userId" name="userId" required>                

            <label for="entityId">Entity ID:</label>
            <input type="text" id="entityId" name="entityId" required>

            <label for="actionOptions">Action:</label>
            <select name="actionOptions" id="actionOptions">
                <option value="CREATE_USER">Create User</option>
                <option value="RESERVE_SUCCESS">Reserve Success</option>
                <option value="RESERVE_ATTEMP">Reserve Attemp</option>
                <option value="RESERVE_EXPIRED">Reserve Expired</option>
                <option value="PAYMENT_CONFIRMED">Payment Confirmed</option>
            </select>

            <label for="entityTypeOptions">Entity Type:</label>
            <select name="entityTypeOptions" id="entityTypeOptions">
                <option value="User">User</option>
                <option value="Seat">Seat</option>
                <option value="Reservation">Reservation</option>
            </select>

            <label for="startDate">Start Date</label>
            <input name="startDate" type="datetime-local" id="startDate" required>

            <label for="endDate">End Date</label>
            <input name="endDate" type="datetime-local" id="endDate" required>

            <label for="createdAt">Created At</label>
            <input name="createdAt" type="date" id="createdAt" required>        

            <button id="filter" class="btn btn-sm rounded-pill button-filter-waiting">Filter</button>
        </nav>
        <div class="scroll-container p-2">
            <div id="audits" class="cards-grid"> <!--tarjetas-->
                <!-- 
                UserId
                Action
                EntityType
                EntityId
                Details "bulletpoints"
                CreatedAt
                -->
                <div class="card-item">
                    <h3>Título Corto</h3>
                    <p>Texto breve.</p>
                </div>
            </div>
        </div>
        <footer id="footer" class="pagination-footer d-flex justify-content-center align-items-center gap-3 mt-4">
            <!--Disabled o no segun hay o no mas paginas-->
            <button id="buttonPrev" class="btn btn-light btn-sm button-page" disabled>‹ Anterior</button>
            <span id="pageIndicator" class="page-indicator"></span>
            <button id="buttonNext" class="btn btn-light btn-sm button-page" disabled>Siguiente ›</button>
        </footer>
    </div>

    <div id="adminAuthModal" class="auth-overlay d-none">
    <div class="auth-panel">
        <h3>Confirmar Identidad</h3>
        <p>Por favor, ingrese su contraseña de administrador para continuar.</p>
        <input type="password" id="adminPassword" class="form-control" placeholder="Contraseña">
        <div class="auth-buttons mt-3">
            <button id="cancelAuth" class="btn btn-secondary">Cancelar</button>
            <button id="confirmAuth" class="btn btn-primary">Validar</button>
        </div>
    </div>

</body>
<script type="module" src="../js/views/adminView.js"></script>
<script type="module" src="../js/tools/timer.js"></script>
</html>
