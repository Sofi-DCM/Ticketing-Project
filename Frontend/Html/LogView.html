<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/Views/LogView.css">
    <link rel="stylesheet" href="../Css/Boxes.css">
    <Link rel="stylesheet" href="../Css/Button.css">
    <link rel="stylesheet" href="../Css/Responsive.css">
</head>
<body>
    <div class="login-container d-flex align-items-center justify-content-end">
        <div class=" glass-box p-5 text-white">
            <!-- esto se debe inyectar con js. box de login parecido pero sin name -->
            <h2 class="mb-4 fw-bold text-uppercase">Create Account</h2>
            <form>
                <div class="mb-3 position-relative">
                    <input type="text" class="form-control custom-input" placeholder="Name">
                </div>

                <div class="mb-3 position-relative">
                    <input type="email" class="form-control custom-input" placeholder="E-mail address">
                </div>
               
                <div class="mb-3 position-relative">
                    <input type="password" class="form-control custom-input" placeholder="Password">
                    <i class="bi bi-lock-fill custom-icon"></i>
                </div>


                <button type="submit" class="btn fw-bold mb-3 button-login">SIGN UP</button>
               
                <div class="text-center small">
                    Ya tiene una cuenta? <a href="#" class="text-white fw-bold custom-link">Ingresar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
