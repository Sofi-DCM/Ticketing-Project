<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/Views/payView.css">
    <link rel="stylesheet" href="../Css/Boxes.css">
    <link rel="stylesheet" href="../Css/Button.css">
    <link rel="stylesheet" href="../Css/toast.css">
    <link rel="stylesheet" href="../Css/responsive.css">
</head>
<body>
    <div class="main-container p-3">
        <header class="header-section d-flex flex-wrap justify-content-between align-items-center mb-4 ">
            <h1 style="margin: 0;">Pestaña de <em>Compras</em></h1>
            <div id="userContainer"></div>
        </header>
        <div id="cartContainer" class="cart-container">
            <div id="reservationContainer" class="reservation-container">
                <div class="d-flex align-items-center mb-3">
                    <i class="bi bi-cart pe-2" style="font-size: 2rem;"></i>
                    <h1 style="margin: 0;" >Carrito</h1>
                </div>
                <div id="tableContainer" class="table-container">
                    <table class="table table-striped custom-table">
                        <thead>
                            <tr>
                                <th class="big-cell">Event</th>
                                <th class="big-cell">Sector</th>
                                <th class="small-cell">Price</th>
                                <th class="small-cell">Seat</th>
                                <th class="small-cell">Timer</th>
                                <th class="small-cell">Quit</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">                             
                        </tbody>
                    </table>
                </div>
            </div>
            <div id="paymentContainer" class="payment-container">
                <h1 style="margin: 0;">Pago</h1>
                <button id="payButton" class="btn rounded-pill button-create-event">Pagar</button>
            </div>
        </div>
    </div>
</body>
<script type="module" src="../js/views/payView.js"></script>
<script type="module" src="../js/tools/timer.js"></script>
</html>
